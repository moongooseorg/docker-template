name: Build and Deploy

env:
  TARGET_IP: 192.168.1.12
  APP_NAME: ${{ github.event.repository.name }}
  HOST_PORT: 8081

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ghcr: ${{ steps.meta.outputs.ghcr }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image name
        id: meta
        run: |
          owner="${{ github.repository_owner }}"
          echo "ghcr=ghcr.io/${owner,,}/${APP_NAME,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.ghcr }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: [self-hosted]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull image on runner
        run: docker pull ${{ needs.build.outputs.ghcr }}:latest

      - name: Deploy to target Pi
        env:
          GHCR_IMAGE: ${{ needs.build.outputs.ghcr }}:latest
          APP_DIR: /home/runner/apps/${{ env.APP_NAME }}
          SSH: ssh -o StrictHostKeyChecking=accept-new -i /home/runner/.ssh/deploy_key runner@${{ env.TARGET_IP }}
        run: |
          IMAGE="${APP_NAME,,}"
          docker tag "$GHCR_IMAGE" "$IMAGE"
          docker save "$IMAGE" | $SSH docker load
          $SSH "mkdir -p '$APP_DIR'"
          $SSH "cat > '$APP_DIR/docker-compose.yml'" < docker-compose.yml
          $SSH "cd '$APP_DIR' && IMAGE='$IMAGE' HOST_PORT='${{ env.HOST_PORT }}' APP_NAME='${{ env.APP_NAME }}' docker compose up -d"
